services:
  db:
    image: mysql:8.0
    container_name: pitchfutebol-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-pitch_futebol}
      MYSQL_USER: ${DB_USER:-pitch}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pitchpass}
    ports:
      - "3306:3306"
    volumes:
      - pitchfutebol-db-data:/var/lib/mysql
      - ./server/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/sql/seed_products.sql:/docker-entrypoint-initdb.d/02-seed.sql

volumes:
  pitchfutebol-db-data:

